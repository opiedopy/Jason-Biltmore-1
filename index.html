<!DOCTYPE html>
<html>
<head>
    <title>Golf Distance to Green</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; text-align: center; font-size: 48px; margin-top: 50px; background: #228B22; color: white; }
        #distance { font-size: 72px; font-weight: bold; }
        #status { font-size: 24px; }
    </style>
</head>
<body>
    <h1>Jason - 1 - Biltmore Forest</h1>
    <div id="status">Requesting location...</div>
    <div id="distance">--- yards</div>

    <script>
        const greenLat = 35.602;  // Replace with exact green center lat
        const greenLon = -82.509; // Replace with exact green center lon

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Earth radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const meters = R * c;
            return Math.round(meters * 1.09361); // Convert to yards
        }

        function updateDistance() {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const dist = haversine(pos.coords.latitude, pos.coords.longitude, greenLat, greenLon);
                    document.getElementById('distance').textContent = dist + ' yards';
                    document.getElementById('status').textContent = 'GPS updated';
                },
                (err) => {
                    document.getElementById('status').textContent = 'GPS error: ' + err.message;
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );
        }

        // Update every 90 seconds (90000 ms)
        updateDistance();  // Initial
        setInterval(updateDistance, 90000);
    </script>
</body>
</html>
